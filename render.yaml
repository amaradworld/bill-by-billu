services:
  - type: web
    name: bill-by-billu-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate resolve --rolled-back 20260629000000_remove_phone_unique && npx prisma migrate deploy
    startCommand: cd backend && node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGINS
        value: https://bill-by-billu.vercel.app,https://billbybillu.vercel.app,http://localhost:5173
    healthCheckPath: /api/health
    autoDeploy: true
