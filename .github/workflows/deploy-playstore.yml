name: Build and Deploy to Play Store

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install Capacitor
        run: cd frontend && npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/camera @capacitor/filesystem @capacitor/share @capacitor/local-notifications @capacitor/haptics @capacitor/status-bar @capacitor/splash-screen @capacitor/keyboard

      - name: Init Capacitor
        run: cd frontend && npx cap init "Bill By Billu" "com.BillbBillu" --web-dir dist

      - name: Add Android
        run: cd frontend && npx cap add android

      - name: Sync Capacitor
        run: cd frontend && npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > frontend/android.keystore

      - name: Build AAB
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease -x lintVitalAnalyzeRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab

  deploy-play-store:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release.aab

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.BillbBillu
          releaseFiles: app-release.aab
          track: production
          status: completed
